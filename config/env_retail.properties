# =============================================================================
# Environment Configuration: Retail DW ETL
# File    : env_retail.properties
# Sourced by: load_daily_sales.ksh, load_product_master.ksh
# Note    : DO NOT commit passwords in plain text - use vault in production
# =============================================================================

# Oracle Connection
DB_HOST=oradb-retail-prod-01.internal.company.com
DB_PORT=1521
DB_SID=RETAILDW
DB_USER=DW_OWNER
DB_PASS=${VAULT_DB_PASS:-changeme}

# Region-specific schemas (override DB_SCHEMA per region)
DB_SCHEMA=DW_OWNER
DB_SCHEMA_NORTH=DW_OWNER
DB_SCHEMA_SOUTH=DW_OWNER
DB_SCHEMA_EAST=DW_OWNER
DB_SCHEMA_WEST=DW_OWNER

# Supplier enrichment schema (used by pkg_product_dim_load.sql)
SUPPLIER_SCHEMA=SUPPLIER_DATA

# Oracle connection string (for Spark / Ab Initio)
ORA_CONNECT_STRING=jdbc:oracle:thin:@${DB_HOST}:${DB_PORT}:${DB_SID}

# Directories
LOG_DIR=/opt/etl/logs/retail
SQLPLUS_DIR=/opt/etl/sqlplus
SOURCE_FILE_DIR=/opt/etl/source_files/retail
AB_PROJECT_DIR=/opt/abinitio/projects/retail_sales_transform

# SQL*Loader
SQLLDR_ERRORS_MAX=50
MAX_REJECTED_ROWS=50

# Thresholds
MIN_EXPECTED_ROWS=100

# Retry settings
MAX_RETRIES=3
RETRY_WAIT_SEC=60

# Notification
NOTIFY_EMAIL=dw-alerts@company.com
BATCH_MODE=Y

# Ab Initio
AB_PARALLELISM=4
AB_HOME=/opt/abinitio/co-op
